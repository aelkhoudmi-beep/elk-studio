<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELK-STUDIO | Video Marketing Verona</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
    position:fixed;
    width:100%;
    top:0;
    background:rgba(15,15,15,0.85);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo{
    font-weight:700;
    font-size:22px;
    color:#d4af37;
}

nav ul{
    display:flex;
    list-style:none;
    gap:35px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-weight:400;
    transition:0.3s;
}

nav ul li a:hover{
    color:#d4af37;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}

.hero-text{
    max-width:600px;
    animation:fadeIn 1.5s ease forwards;
}

.hero h1{
    font-size:60px;
    line-height:1.1;
    margin-bottom:20px;
}

.gold{
    color:#d4af37;
}

.hero p{
    color:#ccc;
    margin-bottom:30px;
    font-size:18px;
}

.btn{
    padding:15px 30px;
    background:#d4af37;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:white;
}

.hero-img{
    animation:float 4s ease-in-out infinite;
}

.hero-img img{
    width:500px;
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-20px);}
    100%{transform:translateY(0px);}
}

/* RESPONSIVE */
@media(max-width:1000px){
    .hero{
        flex-direction:column;
        text-align:center;
        margin-top:100px;
    }
    .hero-img img{
        width:300px;
        margin-top:40px;
    }
    .hero h1{
        font-size:40px;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">ELK-STUDIO</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Servizi</a></li>
        <li><a href="#">Chi siamo</a></li>
        <li><a href="#">Contatti</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>La nuova piattaforma di <span class="gold">Video Marketing</span> per attività locali</h1>
        <p>Aiutiamo le aziende di Verona ad attirare nuovi clienti attraverso video strategici e gestione professionale dei social.</p>
        
        <a class="btn" href="https://wa.me/393425768672?text=Ciao%20ELK-STUDIO%2C%20vorrei%20prenotare%20una%20consulenza%20gratuita%20per%20il%20mio%20business." target="_blank">
            Prenota su WhatsApp
        </a>
    </div>

    <div class="hero-img">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Video Marketing">
    </div>
</section>

</body>
</html>
