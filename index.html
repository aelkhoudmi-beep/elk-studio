<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f0f0f;color:white;scroll-behavior:smooth;}
section{padding:100px 8%;position:relative;}
.gold{color:#d4af37;}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(15,15,15,0.9);
backdrop-filter:blur(8px);
z-index:1000;
}

.brand-text{
font-weight:700;
color:#d4af37;
font-size:20px;
}

.center-logo{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.center-logo img{
height:45px;
width:auto;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
transition:0.3s;
}

nav a:hover{color:#d4af37;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
flex-direction:column;
background:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.hero h1,
.hero p,
.hero .btn{
position:relative;
z-index:2;
}

.hero h1{
font-size:60px;
max-width:900px;
margin-bottom:20px;
}

.hero p{
color:#ccc;
margin-bottom:30px;
max-width:700px;
}

.btn{
padding:15px 35px;
background:#d4af37;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:0.3s;
display:inline-block;
}

.btn:hover{background:white;}

/* SERVICES */
.services{
background:#111;
text-align:center;
background-image:url('https://images.unsplash.com/photo-1557804506-669a67965ba0');
background-size:cover;
background-position:center;
}

.services::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:0;
}

.services h2,
.service-grid{
position:relative;
z-index:2;
}

.service-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:50px;
}

.card{
background:rgba(26,26,26,0.9);
padding:40px;
width:280px;
border-radius:15px;
transition:0.4s;
cursor:pointer;
border:1px solid transparent;
backdrop-filter:blur(5px);
}

.card:hover{
transform:translateY(-10px);
border:1px solid #d4af37;
}

/* PORTFOLIO */
.portfolio{text-align:center;}

.filter-buttons{margin-bottom:40px;}

.filter-buttons button{
padding:10px 20px;
margin:5px;
border:none;
background:#1a1a1a;
color:white;
cursor:pointer;
border-radius:20px;
}

.filter-buttons button.active,
.filter-buttons button:hover{
background:#d4af37;
color:black;
}

.portfolio-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.portfolio-item{
width:250px;
height:180px;
border-radius:10px;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

.portfolio-item::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
transition:0.3s;
}

.portfolio-item:hover::after{
background:rgba(0,0,0,0.3);
}

.portfolio-item span{
position:relative;
z-index:2;
}

/* PRICING */
.pricing{
background:#111;
text-align:center;
}

.pricing-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.price-card{
background:#1a1a1a;
padding:40px;
width:280px;
border-radius:15px;
border:1px solid transparent;
transition:0.4s;
}

.price-card:hover{
border:1px solid #d4af37;
transform:translateY(-10px);
}

.price{
font-size:35px;
color:#d4af37;
margin:20px 0;
}

/* FAQ */
.faq{text-align:center;}

.faq-item{
max-width:700px;
margin:20px auto;
text-align:left;
}

.faq-question{
background:#1a1a1a;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.faq-answer{
display:none;
padding:15px;
color:#ccc;
}

/* FOOTER */
footer{
background:#0a0a0a;
text-align:center;
padding:40px 8%;
color:#aaa;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
.hero h1{font-size:38px;}
nav ul{display:none;}
}
</style>
